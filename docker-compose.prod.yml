services:
  postgres:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        REQUIREMENTS_FILE: production.txt
    user: "0:0"
    restart: always
    env_file: ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - log_files:/var/log/pediacore
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && mkdir -p /app/media && chown -R django:django /app/staticfiles /app/media /var/log/pediacore && exec su -s /bin/sh django -c 'gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --access-logfile - --error-logfile -'"

  backend-qcluster:
    image: pediacore-backend:latest
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes:
      - media_files:/app/media
      - log_files:/var/log/pediacore
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: sh -c "exec python manage.py qcluster"

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_MP_PUBLIC_KEY: ${VITE_MP_PUBLIC_KEY}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_var:/var/lib/letsencrypt:ro
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    profiles:
      - certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
    entrypoint: ["/bin/sh", "-c", "if [ $$# -eq 0 ]; then trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done; else exec certbot \"$$@\"; fi", "--"]

volumes:
  postgres_data:
  static_files:
  media_files:
  log_files:
  certbot_etc:
  certbot_var:
