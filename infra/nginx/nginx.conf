upstream backend {
    server backend:8000;
}

# Hide nginx version in headers and error pages
server_tokens off;

# Rate limiting — shared memory zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/m;

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

server {
    listen 80;
    server_name estefipediatra.com www.estefipediatra.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name estefipediatra.com www.estefipediatra.com;

    ssl_certificate /etc/letsencrypt/live/estefipediatra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/estefipediatra.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (applied to ALL responses)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # NOTE: CSP is NOT set at server level — it is set per-location because
    # /admin/ needs 'unsafe-eval' for Alpine.js (django-unfold) while the
    # public site must stay strict. Django middleware handles CSP for /admin/ and /api/.

    # File upload limit (matches Django setting)
    client_max_body_size 10M;

    # ── BLOCK SENSITIVE PATHS (BEFORE any other location) ────────────────
    # Block dotfiles (.git, .env, .htaccess, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block sensitive file extensions
    location ~* \.(env|bak|sql|log|conf|yaml|yml|toml|sh|py|pyc)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common attack paths
    location ~* (wp-admin|wp-login|xmlrpc|phpmyadmin|\.php) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── DJANGO ENDPOINTS ─────────────────────────────────────────────────

    # Django static files (collectstatic output via shared volume)
    location ^~ /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Django media files (via shared volume)
    location ^~ /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Login endpoint — strict rate limit to prevent brute force
    location /api/v1/token/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /a/{token} is handled by React SPA (falls through to location /)
    # The API endpoint moved to /api/v1/appointments/token/{token}/ (covered by /api/ block)

    # Django API — rate limited
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Django Admin — strict rate limit (only 1 user: the doctor)
    # NOTE: the admin is served at /gestion-9f3a/ (obfuscated path), NOT /admin/
    location /gestion-9f3a/ {
        limit_req zone=admin burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check — no rate limit but restricted logging
    location /health/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── FRONTEND (React SPA) ────────────────────────────────────────────

    # Static assets from Vite build (hashed filenames — cache aggressively)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # React SPA — all other routes serve index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # No cache for HTML so browsers always check freshness
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # CSP for the public React SPA (strict — no eval)
        # NOTE: 'unsafe-inline' removed from script-src — React SPA uses bundled files only.
        # 'unsafe-inline' is kept in style-src for MercadoPago Bricks inline styles.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.mercadopago.com https://*.mlstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: *.mlstatic.com; font-src 'self' data:; connect-src 'self' https://*.mercadopago.com https://*.mercadolibre.com https://*.mlstatic.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://*.mercadopago.com https://*.mercadolibre.com https://*.mlstatic.com https://www.google.com https://maps.google.com; frame-ancestors 'none';" always;
    }
}
