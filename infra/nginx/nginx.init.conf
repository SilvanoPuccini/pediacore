# nginx.init.conf — HTTP-only config for initial SSL certificate setup
#
# USAGE:
#   Before you have SSL certs, temporarily replace nginx.conf with this file:
#   cp infra/nginx/nginx.init.conf infra/nginx/nginx.conf
#   docker compose -f docker-compose.prod.yml up -d nginx
#   make ssl-init
#   cp infra/nginx/nginx.conf.bak infra/nginx/nginx.conf
#   docker compose -f docker-compose.prod.yml restart nginx
#
# Or use the deploy.sh script which handles this automatically.

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name estefipediatra.com www.estefipediatra.com;

    # Certbot ACME challenge — must be accessible on port 80
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    # Proxy API during init phase (optional — remove if not needed)
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Temporary landing while SSL is being set up
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
